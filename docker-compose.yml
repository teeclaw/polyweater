version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: polyweather-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: polyweather
      POSTGRES_USER: polyweather_user
      POSTGRES_PASSWORD: secure_trading_pass_2024
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
      - ./database/config/postgresql.conf:/etc/postgresql/postgresql.conf
    ports:
      - "5433:5432"
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polyweather_user -d polyweather"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - polyweather-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: polyweather-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
      - ./redis/config/redis.conf:/etc/redis/redis.conf
    command: redis-server /etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - polyweather-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  monitoring:
    image: prom/prometheus:latest
    container_name: polyweather-monitoring
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - polyweather-network
    depends_on:
      - postgres
      - redis

  polyweather-bot:
    build: .
    container_name: polyweather-trading-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://polyweather_user:secure_trading_pass_2024@postgres:5432/polyweather
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    ports:
      - "8000:8000"  # Prometheus metrics
      - "8765:8765"  # WebSocket server
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - polyweather-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: polyweather-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://polyweather_user:secure_trading_pass_2024@postgres:5432/polyweather?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - polyweather-network
    depends_on:
      - postgres

  redis-exporter:
    image: oliver006/redis_exporter
    container_name: polyweather-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    networks:
      - polyweather-network
    depends_on:
      - redis

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: polyweather-dashboard
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8080
      - REACT_APP_WS_URL=ws://localhost:8765
    networks:
      - polyweather-network
    depends_on:
      - polyweather-bot
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  polyweather-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16