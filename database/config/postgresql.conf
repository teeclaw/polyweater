# PostgreSQL Configuration for High-Frequency Trading
# Optimized for PolyWeather Trading Bot

# Connection Settings
max_connections = 100
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 4MB
maintenance_work_mem = 64MB

# Write Performance
wal_buffers = 16MB
checkpoint_completion_target = 0.9
wal_sync_method = fsync
synchronous_commit = off  # Faster writes, small risk of losing last few transactions
commit_delay = 100
commit_siblings = 5

# Query Performance
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Time-series Optimization
temp_tablespaces = ''
default_tablespace = ''

# Logging for Trading Analysis
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_statement = 'ddl'
log_min_duration_statement = 1000  # Log slow queries > 1s
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_lock_waits = on
log_temp_files = 10MB

# Performance Monitoring
track_activities = on
track_counts = on
track_io_timing = on
track_functions = pl

# Background Writer
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0

# Auto-vacuum for High-Frequency Data
autovacuum = on
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.02
autovacuum_analyze_scale_factor = 0.01