# PostgreSQL Secure Configuration for High-Frequency Trading
# PolyWeather Trading Bot - SECURITY HARDENED

# Connection Settings - SECURED
max_connections = 50  # Reduced for security
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 4MB
maintenance_work_mem = 64MB

# SSL/TLS Configuration - CRITICAL SECURITY
ssl = on
ssl_cert_file = '/var/lib/postgresql/ssl/server.crt'
ssl_key_file = '/var/lib/postgresql/ssl/server.key'
ssl_ca_file = '/var/lib/postgresql/ssl/ca.crt'
ssl_crl_file = '/var/lib/postgresql/ssl/root.crl'
ssl_ciphers = 'HIGH:MEDIUM:+3DES:!aNULL'
ssl_prefer_server_ciphers = on
ssl_ecdh_curve = 'prime256v1'
ssl_min_protocol_version = 'TLSv1.2'
ssl_max_protocol_version = 'TLSv1.3'

# Authentication - MAXIMUM SECURITY
password_encryption = scram-sha-256
krb_server_keyfile = '/etc/postgresql/krb5.keytab'
db_user_namespace = off
row_security = on  # Enable Row Level Security globally

# Connection Security
listen_addresses = '*'  # Will be restricted by Docker network
port = 5432
max_connections = 50
superuser_reserved_connections = 3

# Prevent unauthorized connections
tcp_keepalives_idle = 600
tcp_keepalives_interval = 30
tcp_keepalives_count = 3
authentication_timeout = 30s
statement_timeout = 300000  # 5 minutes max query time
lock_timeout = 60000       # 1 minute max lock wait
idle_in_transaction_session_timeout = 600000  # 10 minutes

# Write Performance - Balanced for Security
wal_level = replica
wal_buffers = 16MB
checkpoint_completion_target = 0.9
wal_sync_method = fsync
synchronous_commit = on  # CHANGED: Security over speed for financial data
commit_delay = 0
commit_siblings = 5
wal_keep_size = 128MB
max_wal_size = 2GB
min_wal_size = 512MB

# Query Performance
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100
constraint_exclusion = partition

# Security Logging - COMPREHENSIVE AUDIT TRAIL
log_destination = 'stderr,csvlog'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0600
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = on

# CRITICAL: Log all database activities for financial audit
log_connections = on
log_disconnections = on
log_duration = on
log_hostname = on
log_line_prefix = '%t [%p] %q%u@%d %h %m '
log_lock_waits = on
log_statement = 'all'  # Log ALL statements for audit
log_temp_files = 0     # Log all temp files
log_min_duration_statement = 0  # Log all queries
log_checkpoints = on
log_min_messages = warning
log_min_error_statement = error

# Security-specific logging
log_parser_stats = on
log_planner_stats = on
log_executor_stats = on
log_statement_stats = on

# Performance Monitoring
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all
track_activity_query_size = 2048

# Background Writer - Conservative for Security
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0

# Auto-vacuum for High-Frequency Data - Enhanced
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s  # More frequent for trading data
autovacuum_vacuum_threshold = 25
autovacuum_analyze_threshold = 25
autovacuum_vacuum_scale_factor = 0.01
autovacuum_analyze_scale_factor = 0.005
autovacuum_freeze_max_age = 200000000
autovacuum_multixact_freeze_max_age = 400000000
autovacuum_vacuum_cost_delay = 10ms

# Memory Settings
shared_preload_libraries = 'pg_stat_statements,auto_explain'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.track_utility = on
pg_stat_statements.save = on

# Auto Explain - For Performance Monitoring
auto_explain.log_min_duration = 1000ms
auto_explain.log_analyze = on
auto_explain.log_buffers = on
auto_explain.log_timing = on
auto_explain.log_triggers = on
auto_explain.log_verbose = on
auto_explain.log_nested_statements = on

# Archive Settings - For Point-in-Time Recovery
archive_mode = on
archive_command = 'cp %p /var/lib/postgresql/archive/%f'
archive_timeout = 300  # 5 minutes

# Replication Settings (for future scaling)
max_wal_senders = 3
wal_sender_timeout = 60s
max_replication_slots = 3

# Security Parameters - ENHANCED
tcp_keepalives_idle = 600
tcp_keepalives_interval = 30  
tcp_keepalives_count = 3

# Resource Limits - Prevent DoS
max_files_per_process = 1000
max_locks_per_transaction = 64
max_pred_locks_per_transaction = 64
max_prepared_transactions = 0  # Disable for security

# Query Planner Security
enable_bitmapscan = on
enable_hashagg = on
enable_hashjoin = on
enable_indexscan = on
enable_indexonlyscan = on
enable_material = on
enable_mergejoin = on
enable_nestloop = on
enable_seqscan = on
enable_sort = on
enable_tidscan = on

# Time Zone
timezone = 'UTC'
log_timezone = 'UTC'

# Locale
lc_messages = 'en_US.UTF-8'
lc_monetary = 'en_US.UTF-8'
lc_numeric = 'en_US.UTF-8'
lc_time = 'en_US.UTF-8'

# Connection Pooling Preparation
max_connections = 50
shared_buffers = 256MB
effective_cache_size = 1GB

# Security Extensions
shared_preload_libraries = 'pg_stat_statements,auto_explain,pg_audit'

# Additional Security Settings
escape_string_warning = on
standard_conforming_strings = on
backslash_quote = safe_encoding

# Prevent dangerous operations
default_transaction_isolation = 'read committed'
default_transaction_read_only = off
transaction_read_only = off

# Query timeout for protection against runaway queries
statement_timeout = 300000  # 5 minutes maximum
lock_timeout = 60000        # 1 minute lock timeout
idle_in_transaction_session_timeout = 600000  # 10 minutes